function periodLabel(){return period==='week'?'May 19–26':period==='month'?'May 2026':'All Time';}

function setPeriod(p){period=p;document.querySelectorAll('.period-btn').forEach(b=>b.classList.remove('active'));event.target.classList.add('active');render();}
function setTab(t){tab=t;document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));event.target.classList.add('active');render();}
function setPod(p){pod=p;render();}

function renderPodBar(){
  const pods=['All','Entertainment','Beauty & Fashion','Athlete & Fitness','Creator','Brands'];
  document.getElementById('podBar').innerHTML=
    pods.map(p=>{const col=pc(p),active=pod===p;return`<button class="pod-btn" onclick="setPod('${p}')" style="background:${active?col+'22':'none'};border-color:${active?col:'#1E2630'};color:${active?col:'#4A5568'}">${p}</button>`;}).join('')+
    `<span style="margin-left:auto;font-size:9px;color:#4A5568">Showing: ${periodLabel()}${pod!=='All'?' · '+pod:''}</span>`;
}

function renderKPIs(){
  const hits=getHits();
  const isBrands=pod==='Brands', isTalent=pod!=='All'&&pod!=='Brands';
  const tActive=TALENT.filter(c=>c.status==='Active'&&!c.type&&(pod==='All'||isBrands||c.pod===pod));
  const tDep=TALENT.filter(c=>c.status==='Departing'&&!c.type&&(pod==='All'||isBrands||c.pod===pod));
  const bActive=BRANDS.filter(c=>c.status==='Active');
  const bDep=BRANDS.filter(c=>c.status==='Departing');
  const uvm=hits.reduce((s,h)=>s+(h.uvm||0),0);
  const tRev=tActive.reduce((s,c)=>s+c.retainer,0);
  const bRev=bActive.reduce((s,c)=>s+(c.retainer||0),0);

  const kpis=[
    {label:isTalent?pod+' — Active':isBrands?'Brands — Active':'Active Talent Clients',
     value:isBrands?bActive.length:tActive.length,
     sub:isBrands?'+'+bDep.length+' departing':isTalent?'+'+tDep.length+' departing':'+'+TALENT.filter(c=>c.status==='Departing').length+' departing soon',
     color:isBrands?C.blue:pc(pod)||C.gold},
    {label:isTalent?pod+' — Departing':isBrands?'Brands — Departing':'Active Brands Clients',
     value:isTalent?tDep.length:isBrands?bDep.length:bActive.length,
     sub:isTalent?'leaving within 60 days':isBrands?'leaving within 60 days':'+'+bDep.length+' departing',
     color:isTalent?C.red:isBrands?C.red:C.blue},
    {label:'Hits — '+periodLabel(),value:hits.length,sub:pod==='All'?'all pods':pod,color:C.green},
    {label:'UVM — '+periodLabel(),value:Math.round(uvm/1e6),suffix:'M',sub:'confirmed UVM only',color:C.purple},
    {label:isTalent?pod+' Revenue':isBrands?'Brands Revenue':'Combined Monthly Rev',
     value:Math.round((isBrands?bRev:isTalent?tRev:tRev+bRev)/1000),suffix:'K',
     sub:'active clients / month',color:C.orange},
  ];
  document.getElementById('kpis').innerHTML=kpis.map(k=>`
    <div class="kpi"><div class="kpi-bar" style="background:${k.color}"></div>
      <div class="kpi-label">${k.label}</div>
      <div class="kpi-value serif">${typeof k.value==='number'?k.value.toLocaleString():k.value}${k.suffix||''}</div>
      <div class="kpi-sub">${k.sub}</div>
    </div>`).join('');
}

function renderRoster(){
  const el=document.getElementById('rosterStrip');
  if(pod==='All'){el.innerHTML='';return;}
  const list=(pod==='Brands'?BRANDS:TALENT.filter(c=>c.pod===pod)).filter(c=>c.status!=='Departed');
  const pills=list.map(c=>{
    const isSpecial=c.type==='one-time'||c.type==='pro-bono';
    const isDep=c.status==='Departing';
    const borderCol=isSpecial?C.teal:isDep?C.red:(pod==='Brands'?C.blue:pc(pod));
    const dotCol=borderCol;
    const nameCol=isSpecial?C.teal:isDep?C.red:C.text;
    const tag=c.type==='one-time'?'ONE-TIME':c.type==='pro-bono'?'PRO BONO':isDep?c.note:null;
    const retainer=c.retainer?fmtM(c.retainer):c.type==='pro-bono'?'No fee':'—';
    return `<div class="pill" style="border-color:${borderCol}22">
      <span class="pill-dot" style="background:${dotCol}"></span>
      <span class="pill-name" style="color:${nameCol}">${c.name}</span>
      ${tag?`<span class="pill-tag" style="color:${borderCol}">${tag}</span>`:''}
      <span class="pill-retainer">${retainer}</span>
    </div>`;
  }).join('');
  el.innerHTML=`<div class="roster-strip"><div class="roster-label">${pod} Roster</div><div class="roster-pills">${pills}</div></div>`;
}

function renderOverview(){
  const hits=getHits();
  const cHits={},cUVM={};
  hits.forEach(h=>{cHits[h.client]=(cHits[h.client]||0)+1;cUVM[h.client]=(cUVM[h.client]||0)+(h.uvm||0);});
  const sorted=Object.entries(cHits).sort((a,b)=>b[1]-a[1]).slice(0,12);
  const lb=sorted.length?sorted.map(([name,cnt],i)=>{
    const p=HITS.find(h=>h.client===name)?.pod||'Brands';
    const col=pc(p);
    return`<div class="hit-row" style="border-left:3px solid ${col}">
      <span style="font-size:11px;color:#4A5568;width:16px;text-align:right">${i+1}</span>
      <div style="flex:1"><div class="serif" style="font-size:12px;color:#F5EDD6">${name}</div>
        <div style="font-size:9px;color:#4A5568">${p}${cUVM[name]?' · UVM: '+fmtU(cUVM[name]):''}</div></div>
      <div style="text-align:right"><div class="serif" style="font-size:18px;color:${col}">${cnt}</div><div style="font-size:9px;color:#4A5568">hits</div></div>
    </div>`;
  }).join(''):`<div class="no-data">No confirmed hits for this period.</div>`;

  const feed=hits.slice(0,22).map(h=>`
    <div class="feed-item" style="border-left:3px solid ${pc(h.pod)}">
      <div class="feed-top"><span class="feed-outlet" style="color:${pc(h.pod)}">${h.outlet}</span>
        <div class="feed-meta">${h.src==='email'?'<span class="email-tag">email</span>':''}<span class="feed-date">${h.date.slice(5).replace('-','/')}</span></div></div>
      <div class="feed-headline">${h.url?`<a href="${h.url}" target="_blank" style="color:#D4CDBE;text-decoration:none;border-bottom:1px solid rgba(201,168,76,0.3);padding-bottom:1px">${h.headline}</a>`:h.headline}</div>
      <div class="feed-bottom"><span class="feed-client">${h.client}</span>${h.uvm?`<span class="uvm">${fmtU(h.uvm)}</span>`:'<span style="font-size:9px;color:#4A5568">—</span>'}</div>
    </div>`).join('');

  document.getElementById('tabContent').innerHTML=`
    <div class="two-col">
      <div class="card"><div class="card-label">From Drive Trackers</div><div class="card-title serif">Hit Leaderboard — ${periodLabel()}</div>${lb}</div>
      <div class="card"><div class="card-label">Coverage Feed</div><div class="card-title serif">Most Recent</div><div class="feed-scroll">${feed}</div></div>
    </div>`;
}

function renderCoverage(){
  const hits=getHits();
  const items=hits.map(h=>`
    <div style="padding:11px 13px;background:#0B0E14;border-radius:6px;border-left:3px solid ${pc(h.pod)}">
      <div class="feed-top"><span class="feed-outlet" style="color:${pc(h.pod)}">${h.outlet}</span>
        <div class="feed-meta">${h.src==='email'?'<span class="email-tag">email</span>':''}<span class="feed-date">${h.date.slice(5).replace('-','/')}</span></div></div>
      <div class="feed-headline" style="margin-bottom:5px">${h.url?`<a href="${h.url}" target="_blank" style="color:#D4CDBE;text-decoration:none;border-bottom:1px solid rgba(201,168,76,0.3);padding-bottom:1px">${h.headline}</a>`:h.headline}</div>
      <div class="feed-bottom"><span class="feed-client">${h.client} · ${h.pod}</span>${h.uvm?`<span class="uvm">${fmtU(h.uvm)}</span>`:'<span style="font-size:9px;color:#4A5568">—</span>'}</div>
    </div>`).join('');
  document.getElementById('tabContent').innerHTML=`
    <div class="card"><div class="card-title serif" style="margin-bottom:16px">All Coverage — ${periodLabel()} · ${hits.length} hits</div>
      <div class="cov-grid">${items||'<div class="no-data">No hits for this period.</div>'}</div></div>`;
}

function renderClients(){
  const hits=getHits();
  const cHits={};hits.forEach(h=>{cHits[h.client]=(cHits[h.client]||0)+1;});
  const pods=['Entertainment','Beauty & Fashion','Athlete & Fitness','Creator'];
  const filtPods=pod==='All'||pod==='Brands'?pods:pods.filter(p=>p===pod);

  const talentHTML=filtPods.map(p=>{
    const col=pc(p);
    const rows=TALENT.filter(c=>c.pod===p).map(c=>{
      const isSpecial=c.type==='one-time'||c.type==='pro-bono';
      const borderCol=isSpecial?C.teal:c.status==='Active'?col:c.status==='Departing'?C.red:C.border;
      const tag=c.type==='one-time'?'ONE-TIME':c.type==='pro-bono'?'PRO BONO':null;
      const noteCol=isSpecial?C.teal:C.red;
      return`<div class="client-row" style="opacity:${c.status==='Departed'?0.3:1};border-left:2px solid ${borderCol}">
        <div>
          <span style="font-size:11px;color:${c.status==='Departed'?C.muted:C.text}">${c.name}</span>
          ${tag?`<span class="special-tag">${tag}</span>`:''}
          ${c.note&&!isSpecial?`<span style="font-size:9px;color:${noteCol};margin-left:8px">${c.note}</span>`:''}
          ${isSpecial?`<span style="font-size:9px;color:#4A5568;margin-left:6px">${c.note}</span>`:''}
        </div>
        <div style="display:flex;align-items:center;gap:10px">
          ${cHits[c.name]?`<span class="serif" style="font-size:11px;color:${col}">${cHits[c.name]} hits</span>`:''}
          <span style="font-size:9px;color:#4A5568">${c.retainer?fmtM(c.retainer):c.type==='pro-bono'?'No fee':c.note||'—'}</span>
        </div>
      </div>`;
    }).join('');
    return`<div class="client-pod-section"><div class="client-pod-header" style="color:${col}"><span style="width:6px;height:6px;background:${col};border-radius:50%;display:inline-block"></span>${p}</div>${rows}</div>`;
  }).join('');

  const bActive=BRANDS.filter(c=>c.status==='Active').length;
  const bDep=BRANDS.filter(c=>c.status==='Departing').length;
  const brandsHTML=BRANDS.map(c=>`
    <div class="client-row" style="opacity:${c.status==='Departed'?0.3:1};border-left:2px solid ${c.status==='Active'?C.blue:c.status==='Departing'?C.red:C.border}">
      <div><span style="font-size:11px;color:${c.status==='Departed'?C.muted:C.text}">${c.name}</span>
        ${c.note?`<span style="font-size:9px;color:${C.red};margin-left:8px">${c.note}</span>`:''}</div>
      <div style="display:flex;align-items:center;gap:10px">
        ${cHits[c.name]?`<span class="serif" style="font-size:11px;color:${C.blue}">${cHits[c.name]} hits</span>`:''}
        <span style="font-size:9px;color:#4A5568">${c.retainer?fmtM(c.retainer):'—'}</span>
      </div>
    </div>`).join('');

  const tActive=TALENT.filter(c=>c.status==='Active'&&!c.type).length;
  const tDep=TALENT.filter(c=>c.status==='Departing').length;
  document.getElementById('tabContent').innerHTML=`
    <div class="two-col">
      <div class="card"><div class="card-label">Talent Division</div><div class="card-title serif">${tActive} Active · ${tDep} Departing</div>${talentHTML}</div>
      <div class="card"><div class="card-label">Brands Division</div><div class="card-title serif">${bActive} Active · ${bDep} Departing</div>${brandsHTML}</div>
    </div>`;
}

function renderRevenue(){
  const pods=[{pod:'Entertainment',rev:33500,pay:14822,n:6},{pod:'Athlete & Fitness',rev:34000,pay:13322,n:9},{pod:'Beauty & Fashion',rev:28000,pay:15947,n:5},{pod:'Creator',rev:27500,pay:15530,n:6}];
  const podHTML=pods.map(r=>{
    const col=pc(r.pod),pct=Math.round((r.rev-r.pay)/r.rev*100);
    return`<div class="rev-pod">
      <div style="display:flex;justify-content:space-between;margin-bottom:6px"><span class="serif" style="font-size:12px;color:${col}">${r.pod}</span><span style="font-size:9px;color:#4A5568">${r.n} clients</span></div>
      <div class="rev-3col">
        <div><div style="font-size:9px;color:#4A5568">Revenue</div><div class="serif" style="font-size:14px;color:${C.green}">${fmtM(r.rev)}</div></div>
        <div><div style="font-size:9px;color:#4A5568">Payroll</div><div class="serif" style="font-size:14px;color:${C.red}">${fmtM(r.pay)}</div></div>
        <div><div style="font-size:9px;color:#4A5568">Net</div><div class="serif" style="font-size:14px;color:#F5EDD6">${fmtM(r.rev-r.pay)}</div></div>
      </div>
      <div class="rev-bar-bg"><div class="rev-bar-fill" style="width:${pct}%;background:${col}"></div></div>
      <div style="font-size:9px;color:#4A5568;margin-top:3px">${pct}% margin</div>
    </div>`;
  }).join('');
  const ovr=[
    {l:'Total Monthly Revenue',v:'$223,745',c:C.green},{l:'Talent Division',v:'$144,250',c:C.gold},
    {l:'Brands Division',v:'$76,075',c:C.blue},{l:'Socials Division',v:'$3,420',c:C.teal},
    {l:'Total Payroll / Month',v:'$127,418',c:C.red},{l:'Other OpEx / Month',v:'$73,000',c:C.orange},
    {l:'Net Profit',v:'$36,547',c:C.green},{l:'Margin',v:'16.3%',c:'#F5EDD6'},
  ].map(r=>`<div class="rev-row"><span style="font-size:11px;color:#4A5568">${r.l}</span><span class="serif" style="font-size:13px;color:${r.c}">${r.v}</span></div>`).join('');
  document.getElementById('tabContent').innerHTML=`
    <div class="two-col">
      <div class="card"><div class="card-title serif" style="margin-bottom:16px">Talent Revenue by Pod</div>${podHTML}</div>
      <div class="card"><div class="card-title serif" style="margin-bottom:16px">Company Overview</div>${ovr}
        <div class="goal-box"><div style="font-size:9px;color:#4A5568;margin-bottom:4px">Revenue needed for 45% margin goal</div>
          <div class="serif" style="font-size:18px;color:${C.gold}">~$364,000 / month</div>
          <div style="font-size:9px;color:#4A5568;margin-top:3px">Currently at $223,745 — 61% of the way there</div>
        </div>
      </div>
    </div>`;
}

function render(){
  renderPodBar();renderKPIs();renderRoster();
  if(tab==='overview')renderOverview();
  else if(tab==='coverage')renderCoverage();
  else if(tab==='clients')renderClients();
  else renderRevenue();
}

setInterval(()=>{
  const n=new Date();
  document.getElementById('clock').textContent=n.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
  document.getElementById('dateLbl').textContent=n.toLocaleDateString([],{weekday:'short',month:'short',day:'numeric'});
},1000);
document.getElementById('clock').textContent=new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
document.getElementById('dateLbl').textContent=new Date().toLocaleDateString([],{weekday:'short',month:'short',day:'numeric'});
render();
</script>
</body>
</html>
