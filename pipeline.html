.content{padding:20px 24px}
.kpis{display:grid;grid-template-columns:repeat(6,1fr);gap:12px;margin-bottom:20px}
.kpi{background:#13181F;border:1px solid #1E2630;border-radius:8px;padding:14px 16px;position:relative;overflow:hidden}
.kpi-bar{position:absolute;top:0;left:0;right:0;height:2px}
.kpi-label{font-size:9px;color:#4A5568;letter-spacing:0.1em;text-transform:uppercase;margin-bottom:6px}
.kpi-value{font-size:26px;color:#F5EDD6;line-height:1;margin-bottom:3px}
.kpi-sub{font-size:9px;color:#4A5568}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:18px}
.three-col{display:grid;grid-template-columns:1fr 1fr 1fr;gap:18px}
.card{background:#13181F;border:1px solid #1E2630;border-radius:8px;padding:18px}
.card-label{font-size:9px;color:#4A5568;letter-spacing:0.12em;text-transform:uppercase;margin-bottom:4px}
.card-title{font-size:18px;color:#F5EDD6;margin-bottom:14px}
.row{padding:9px 11px;background:#0B0E14;border-radius:5px;margin-bottom:6px}
.row-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:3px}
.name{font-size:12px;color:#F5EDD6}
.cat-tag{font-size:8px;padding:1px 6px;border-radius:3px;letter-spacing:0.06em;text-transform:uppercase}
.status-tag{font-size:8px;padding:2px 7px;border-radius:10px;letter-spacing:0.05em}
.row-meta{font-size:9px;color:#4A5568}
.scroll{max-height:520px;overflow-y:auto}
.funnel-bar{height:28px;border-radius:4px;display:flex;align-items:center;padding:0 10px;margin-bottom:6px;cursor:pointer;transition:opacity 0.15s}
.funnel-bar:hover{opacity:0.85}
.funnel-label{font-size:10px;font-weight:bold;flex:1}
.funnel-count{font-size:16px;font-family:Georgia,serif}
.funnel-pct{font-size:9px;opacity:0.7;margin-left:6px}
.cold-row{padding:8px 11px;background:#0B0E14;border-radius:5px;margin-bottom:5px;display:flex;justify-content:space-between;align-items:center}
.section-header{font-size:10px;color:#4A5568;letter-spacing:0.1em;text-transform:uppercase;margin:12px 0 6px;padding-bottom:4px;border-bottom:1px solid #1E2630}

  {name:'Brooke Mason',cat:'Talent',date:'5/26',status:'Followed up'},
  {name:'Kaitlyn Lavery',cat:'Talent',date:'5/4',status:''},
  {name:'Pagerie',cat:'Brands',date:'5/4',status:'In conversation'},
  {name:'Kate Bartlett',cat:'Talent',date:'4/22',status:''},
  {name:'Aspyn Ovard',cat:'Talent',date:'4/23',status:''},
  {name:'Faith Schroder',cat:'Talent',date:'4/21',status:''},
  {name:'Rachel Stuhlmann',cat:'Talent',date:'4/21',status:''},
];

const fmtM=n=>n?'$'+n.toLocaleString():'—';
let currentTab='pipeline', currentFilter='All';

function sg(s){return statusGroup(s);}
function statusGroup(s){
  if(!s||!s.trim()) return 'awaiting';
  s=s.trim();
  if(s==='SIGNED') return 'signed';
  if(s.startsWith('Passed')) return 'passed';
  if(s==='In discussion'||s.startsWith('In discussion')) return 'discussion';
  if(s.startsWith('Holding')) return 'holding';
  if(s.startsWith('Followed up')||s.startsWith('Had follow')||s.startsWith('Had second')) return 'followedup';
  return 'other';
}

const FILTERS=['All','Talent','Brands','UK','Socials'];

function setTab(t){
  currentTab=t;currentFilter='All';
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  event.target.classList.add('active');
  render();
}
function setFilter(f){currentFilter=f;render();}

function renderFilterBar(){
  document.getElementById('filterBar').innerHTML=
    FILTERS.map(f=>{
      const col=CAT_COLORS[f]||C.gold;
      const active=currentFilter===f;
      return`<button class="filter-btn" onclick="setFilter('${f}')" style="background:${active?col+'22':'none'};border-color:${active?col:'#1E2630'};color:${active?col:'#4A5568'}">${f}</button>`;
    }).join('')+
    `<span style="margin-left:auto;font-size:9px;color:#4A5568">${currentTab.toUpperCase()}${currentFilter!=='All'?' · '+currentFilter:''}</span>`;
}

function filtered(arr){
  if(currentFilter==='All') return arr;
  return arr.filter(r=>r.cat===currentFilter);
}

function renderKPIs(){
  const all=PIPELINE;
  const signed=all.filter(r=>sg(r.status)==='signed').length;
  const discussion=all.filter(r=>sg(r.status)==='discussion').length;
  const holding=all.filter(r=>sg(r.status)==='holding').length;
  const followedup=all.filter(r=>sg(r.status)==='followedup').length;
  const awaiting=all.filter(r=>sg(r.status)==='awaiting').length;
  const passed=all.filter(r=>sg(r.status)==='passed').length;
  const total=all.length;
  const closeRate=Math.round(signed/(total-awaiting-holding)*100);

  const kpis=[
    {label:'Total Pipeline',value:total,sub:'all leads tracked',color:C.gold},
    {label:'Signed',value:signed,sub:'from this pipeline',color:C.green},
    {label:'In Discussion',value:discussion,sub:'active conversations',color:C.blue},
    {label:'Holding on PR',value:holding,sub:'waiting to start',color:C.orange},
    {label:'Followed Up',value:followedup,sub:'proposal out, no reply',color:C.purple},
    {label:'Close Rate',value:closeRate,suffix:'%',sub:'signed vs decided leads',color:C.teal},
  ];
  document.getElementById('kpis').innerHTML=kpis.map(k=>`
    <div class="kpi"><div class="kpi-bar" style="background:${k.color}"></div>
      <div class="kpi-label">${k.label}</div>
      <div class="kpi-value serif">${k.value}${k.suffix||''}</div>
      <div class="kpi-sub">${k.sub}</div>
    </div>`).join('');
}

function makeRow(r, showStatus=true){
  const grp=sg(r.status);
  const scol=STATUS_COLORS[grp];
  const slbl=r.status||'Awaiting response';
  const catCol=cc(r.cat);
  return`<div class="row" style="border-left:3px solid ${scol}">
    <div class="row-top">
      <span class="name">${r.name}</span>
      <div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap;justify-content:flex-end">
        ${r.cat?`<span class="cat-tag" style="background:${catCol}22;color:${catCol}">${r.cat}</span>`:''}
        ${showStatus?`<span class="status-tag" style="background:${scol}22;color:${scol}">${slbl}</span>`:''}
      </div>
    </div>
    <div class="row-meta">${r.met?'Met: '+r.met:''}${r.met&&r.sent?' · ':''}${r.sent?'Proposal: '+r.sent:''}</div>
  </div>`;
}

function renderPipeline(){
  const data=filtered(PIPELINE);

  // Group by status
  const groups={
    discussion: data.filter(r=>sg(r.status)==='discussion'),
    awaiting:   data.filter(r=>sg(r.status)==='awaiting'),
    holding:    data.filter(r=>sg(r.status)==='holding'),
    followedup: data.filter(r=>sg(r.status)==='followedup'),
  };

  // Funnel
  const total=PIPELINE.length;
  const funnelData=[
    {label:'Signed',count:PIPELINE.filter(r=>sg(r.status)==='signed').length,color:C.green},
    {label:'In Discussion',count:groups.discussion.length,color:C.blue},
    {label:'Holding on PR',count:groups.holding.length,color:C.orange},
    {label:'Followed Up — Awaiting Reply',count:groups.followedup.length,color:C.purple},
    {label:'Proposal Out — No Status',count:groups.awaiting.length,color:C.muted},
    {label:'Passed',count:PIPELINE.filter(r=>sg(r.status)==='passed').length,color:C.red},
  ];
  const maxCount=Math.max(...funnelData.map(f=>f.count));

  const funnelHTML=funnelData.map(f=>`
    <div class="funnel-bar" style="background:${f.color}22;border:1px solid ${f.color}44;width:${Math.max(30,Math.round(f.count/maxCount*100))}%">
      <span class="funnel-label" style="color:${f.color}">${f.label}</span>
      <span class="funnel-count" style="color:${f.color}">${f.count}</span>
      <span class="funnel-pct" style="color:${f.color}">${Math.round(f.count/total*100)}%</span>
    </div>`).join('');

  // Active leads (discussion + awaiting recent)
  const active=[...groups.discussion,...groups.awaiting,...groups.holding].slice(0,20);

  document.getElementById('tabContent').innerHTML=`
    <div style="background:rgba(201,168,76,0.07);border:1px solid rgba(201,168,76,0.2);border-radius:6px;padding:8px 14px;margin-bottom:16px;font-size:10px;color:#C9A84C;display:flex;gap:20px;flex-wrap:wrap">
      <span>📋 <strong>Post-Pitch Tracker</strong> — all leads after first meeting</span>
      <span style="color:rgba(201,168,76,0.5)">|</span>
      <span>Anne Leopard owns AL Talent &amp; AL Brands prospect lists</span>
      <span style="color:rgba(201,168,76,0.5)">|</span>
      <span>Nicole Pila owns Cold Outreach &amp; YAMM email campaigns</span>
    </div>
    <div class="two-col">
      <div class="card">
        <div class="card-label">Post-Pitch Tracker — All Team</div>
        <div class="card-title serif">Conversion Funnel</div>
        ${funnelHTML}
        <div style="margin-top:16px;padding:12px;background:#0B0E14;border-radius:6px;border:1px solid #1E2630">
          <div style="font-size:9px;color:#4A5568;margin-bottom:8px;letter-spacing:0.1em;text-transform:uppercase">By Category</div>
          ${['Talent','Brands','UK','Socials','Project'].map(cat=>{
            const n=PIPELINE.filter(r=>r.cat===cat).length;
            const s=PIPELINE.filter(r=>r.cat===cat&&sg(r.status)==='signed').length;
            if(!n) return '';
            return`<div style="display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid #1E2630">
              <span style="font-size:10px;color:${cc(cat)}">${cat}</span>
              <span style="font-size:9px;color:#4A5568">${n} leads · <span style="color:${C.green}">${s} signed</span></span>
            </div>`;
          }).join('')}
        </div>
      </div>
      <div class="card">
        <div class="card-label">Needs Attention</div>
        <div class="card-title serif">Active Leads</div>
        <div class="scroll">${active.map(r=>makeRow(r)).join('')}</div>
      </div>
    </div>`;
}

function renderFollowups(){
  const data=filtered(PIPELINE).filter(r=>sg(r.status)==='followedup'||sg(r.status)==='holding');
  const followedUp=filtered(PIPELINE).filter(r=>sg(r.status)==='followedup');
  const holding=filtered(PIPELINE).filter(r=>sg(r.status)==='holding');

  document.getElementById('tabContent').innerHTML=`
    <div class="two-col">
      <div class="card">
        <div class="card-label">${followedUp.length} leads</div>
        <div class="card-title serif">Followed Up — No Reply</div>
        <div class="scroll">${followedUp.map(r=>makeRow(r)).join('')||'<div style="color:#4A5568;font-size:11px;padding:16px">None in this category.</div>'}</div>
      </div>
      <div class="card">
        <div class="card-label">${holding.length} leads</div>
        <div class="card-title serif">Holding on PR</div>
        <div class="scroll">${holding.map(r=>makeRow(r)).join('')||'<div style="color:#4A5568;font-size:11px;padding:16px">None in this category.</div>'}</div>
      </div>
    </div>`;
}

function renderSigned(){
  const data=filtered(PIPELINE).filter(r=>sg(r.status)==='signed');
  const byMonth={};
  data.forEach(r=>{
    const month=r.sent?r.sent.split('/')[0]+'/26':r.met?r.met.split('/')[0]+'/26':'Unknown';
    byMonth[month]=(byMonth[month]||[]);
    byMonth[month].push(r);
  });

  document.getElementById('tabContent').innerHTML=`
    <div class="two-col">
      <div class="card">
        <div class="card-label">${data.length} total signed from pipeline</div>
        <div class="card-title serif">Signed Clients</div>
        <div class="scroll">${data.map(r=>`
          <div class="row" style="border-left:3px solid ${C.green}">
            <div class="row-top">
              <span class="name">${r.name}</span>
              <span class="cat-tag" style="background:${cc(r.cat)}22;color:${cc(r.cat)}">${r.cat||'—'}</span>
            </div>
            <div class="row-meta">${r.met?'Met: '+r.met:''}${r.met&&r.sent?' · ':''}${r.sent?'Proposal: '+r.sent:''}</div>
          </div>`).join('')}
        </div>
      </div>
      <div class="card">
        <div class="card-label">Signed by month</div>
        <div class="card-title serif">Close Cadence</div>
        ${Object.entries(byMonth).sort((a,b)=>b[0].localeCompare(a[0])).map(([month,leads])=>`
          <div style="margin-bottom:12px">
            <div class="section-header">${month}</div>
            ${leads.map(r=>`<div style="padding:6px 10px;background:#0B0E14;border-radius:4px;margin-bottom:4px;display:flex;justify-content:space-between">
              <span style="font-size:11px;color:${C.green}">${r.name}</span>
              <span style="font-size:9px;color:#4A5568">${r.cat||'—'}</span>
            </div>`).join('')}
          </div>`).join('')}
      </div>
    </div>`;
}

function renderPassed(){
  const data=filtered(PIPELINE).filter(r=>sg(r.status)==='passed');
  const budget=data.filter(r=>r.status.includes('budget'));
  const elsewhere=data.filter(r=>r.status.includes('signed elsewhere'));

  document.getElementById('tabContent').innerHTML=`
    <div class="two-col">
      <div class="card">
        <div class="card-label">${budget.length} leads</div>
        <div class="card-title serif">Passed — Budget</div>
        <div class="scroll">${budget.map(r=>makeRow(r,false)).join('')||'<div style="color:#4A5568;padding:16px;font-size:11px">None.</div>'}</div>
      </div>
      <div class="card">
        <div class="card-label">${elsewhere.length} leads</div>
        <div class="card-title serif">Passed — Signed Elsewhere</div>
        <div style="background:rgba(224,91,91,0.07);border:1px solid rgba(224,91,91,0.2);border-radius:6px;padding:8px 12px;margin-bottom:14px;font-size:10px;color:${C.red}">
          ${elsewhere.length} leads signed with a competitor. These are worth revisiting if their current PR ends.
        </div>
        <div class="scroll">${elsewhere.map(r=>makeRow(r,false)).join('')||'<div style="color:#4A5568;padding:16px;font-size:11px">None.</div>'}</div>
      </div>
    </div>`;
}

function renderCold(){
  const data=filtered(COLD);
  const fresh=data.filter(r=>!r.status||r.status==='');
  const followed=data.filter(r=>r.status==='Followed up');
  const convo=data.filter(r=>r.status==='In conversation');
  const passed=data.filter(r=>r.status==='Passed');

  const makeC=r=>`<div class="cold-row" style="border-left:3px solid ${r.status==='In conversation'?C.blue:r.status==='Followed up'?C.purple:r.status==='Passed'?C.red:C.muted}">
    <div><span style="font-size:11px;color:#D4CDBE">${r.name}</span><span style="font-size:9px;color:#4A5568;margin-left:8px">${r.date}</span></div>
    <div style="display:flex;gap:6px;align-items:center">
      <span class="cat-tag" style="background:${cc(r.cat)}22;color:${cc(r.cat)}">${r.cat}</span>
      ${r.status?`<span style="font-size:9px;color:#4A5568">${r.status}</span>`:''}
    </div>
  </div>`;

  document.getElementById('tabContent').innerHTML=`
    <div class="three-col">
      <div class="card">
        <div class="card-label">${fresh.length} leads</div>
        <div class="card-title serif">Fresh Outreach</div>
        <div class="scroll">${fresh.map(makeC).join('')||'<div style="color:#4A5568;padding:16px;font-size:11px">None.</div>'}</div>
      </div>
      <div class="card">
        <div class="card-label">${followed.length} leads + ${convo.length} in convo</div>
        <div class="card-title serif">Followed Up / In Convo</div>
        ${convo.length?`<div class="section-header" style="color:${C.blue}">In Conversation</div>${convo.map(makeC).join('')}`:''}
        <div class="section-header">Followed Up</div>
        <div class="scroll">${followed.map(makeC).join('')||'<div style="color:#4A5568;padding:16px;font-size:11px">None.</div>'}</div>
      </div>
      <div class="card">
        <div class="card-label">${passed.length} passed</div>
        <div class="card-title serif">Passed</div>
        <div class="scroll">${passed.map(makeC).join('')||'<div style="color:#4A5568;padding:16px;font-size:11px">None.</div>'}</div>
      </div>
    </div>`;
}

function render(){
  renderFilterBar();
  renderKPIs();
  if(currentTab==='pipeline') renderPipeline();
  else if(currentTab==='followups') renderFollowups();
  else if(currentTab==='signed') renderSigned();
  else if(currentTab==='passed') renderPassed();
  else if(currentTab==='cold') renderCold();
}

setInterval(()=>{
  const n=new Date();
  document.getElementById('clock').textContent=n.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
  document.getElementById('dateLbl').textContent=n.toLocaleDateString([],{weekday:'short',month:'short',day:'numeric'});
},1000);
document.getElementById('clock').textContent=new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
document.getElementById('dateLbl').textContent=new Date().toLocaleDateString([],{weekday:'short',month:'short',day:'numeric'});
render();
</script>
